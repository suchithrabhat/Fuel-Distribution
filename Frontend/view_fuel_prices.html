<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Fuel Prices</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="distributor-panel.css">
</head>

<body>
<div class="dist-shell">
    <aside class="sidebar" aria-label="Distributor navigation">
        <div class="logo">Distributor Panel</div>
        <a href="add_fuel_price.html">Add Fuel Price</a>
        <a href="view_fuel_prices.html" class="active">View Fuel Price</a>
        <a href="view_bookings.html">View Bookings</a>
        <a href="view_revenue.html">View Revenue</a>
        <a href="login.html">Logout</a>
    </aside>

    <main class="dist-main">
        <section class="dist-page">
            <header class="dist-header">
                <div class="dist-title">
                    <span class="dist-eyebrow">Fuel Rate Board</span>
                    <h1>Fuel Prices</h1>
                    <p>Review live fuel rates and update them when supply costs change.</p>
                </div>

                <div class="dist-stat" aria-live="polite">
                    <div>
                        <span>Fuel Entries</span>
                        <strong id="fuelCount">0</strong>
                    </div>
                    <div class="dist-stat-icon">FP</div>
                </div>
            </header>

            <div class="dist-toolbar">
                <label class="search-wrap" for="fuelSearch">
                    <input id="fuelSearch" type="search" placeholder="Search fuel prices" autocomplete="off">
                </label>
            </div>

            <section class="table-box" aria-label="Fuel price table">
                <div class="table-scroll">
                    <table class="dist-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Fuel Type</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody id="tableBody">
                            <tr>
                                <td colspan="4" class="state-cell">
                                    <strong>Loading prices</strong>
                                    Fetching current fuel rates.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <p id="message"></p>
        </section>
    </main>
</div>

<script>
const tableBody = document.getElementById("tableBody");
const fuelCount = document.getElementById("fuelCount");
const fuelSearch = document.getElementById("fuelSearch");
let fuelPrices = [];

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function renderFuelPrices(list) {
    fuelCount.textContent = fuelPrices.length;

    if (list.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="4" class="state-cell">
                    <strong>No fuel data found</strong>
                    Add fuel pricing to publish rates.
                </td>
            </tr>
        `;
        return;
    }

    tableBody.innerHTML = list.map(fuel => `
        <tr>
            <td data-label="ID"><span class="id-pill">${escapeHtml(fuel.id)}</span></td>
            <td data-label="Fuel Type"><span class="fuel-pill">${escapeHtml(fuel.fuel_type)}</span></td>
            <td data-label="Price" class="price-cell">₹${escapeHtml(fuel.price)}</td>
            <td data-label="Action">
                <button class="update-btn" onclick="updateFuel(${Number(fuel.id)})">Update</button>
            </td>
        </tr>
    `).join("");
}

function filterFuelPrices() {
    const query = fuelSearch.value.trim().toLowerCase();

    if (!query) {
        renderFuelPrices(fuelPrices);
        return;
    }

    const filtered = fuelPrices.filter(fuel => {
        return [fuel.id, fuel.fuel_type, fuel.price]
            .some(value => String(value ?? "").toLowerCase().includes(query));
    });

    renderFuelPrices(filtered);
}

function loadFuelPrices() {
    fetch("http://127.0.0.1:7000/view_fuel_prices")
        .then(res => res.json())
        .then(data => {
            fuelPrices = Array.isArray(data) ? data : [];
            filterFuelPrices();
        })
        .catch(error => {
            console.log(error);
            tableBody.innerHTML = `
                <tr>
                    <td colspan="4" class="state-cell error">
                        <strong>Fuel prices could not be loaded</strong>
                        Check that the backend server is running.
                    </td>
                </tr>
            `;
        });
}

function updateFuel(id) {
    window.location.href = `add_fuel_price.html?id=${id}`;
}

fuelSearch.addEventListener("input", filterFuelPrices);
loadFuelPrices();
</script>
</body>
</html>
